services:
  - type: web
    name: nexus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Nexus University Platform
      - key: STORAGE_PATH
        value: ./storage
      - key: MAX_FILE_SIZE_MB
        value: "25"
      - key: LOGIN_ATTEMPT_LIMIT
        value: "5"
      - key: LOGIN_LOCKOUT_MINUTES
        value: "15"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: TOTP_ISSUER
        value: Nexus University
      - key: ADMIN_EMAIL
        value: ivanknyaze@gmail.com
      - key: ADMIN_USERNAME
        value: ivan_admin
